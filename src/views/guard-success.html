<!DOCTYPE html>
<html lang="en">
<head>
  <title>yasi-bot - steam guard</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="card">
    <div class="chrome">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot {{SESSION_DOT_CLASS}}"></div>
      </div>
      <div class="chrome-title">yasi-bot - steam guard</div>
    </div>
    <div class="body">
      <div class="status-line">
        <span class="prompt">&gt;</span>
        <span class="message">code received</span>
        <span class="cursor"></span>
      </div>
      <h1>you're all set</h1>
      <p class="sub">logging in... you'll be redirected to the main screen in a few seconds</p>
      <div class="footer-note">running locally · {{LOCAL_ADDRESS}}:{{PORT}}</div>
    </div>
  </div>
  <script>
    // redirect user to the idle session view
    setTimeout(() => window.location.replace('/'), 3000);
  </script>
</body>
</html>
