<!DOCTYPE html>
<html lang="en">
<head>
  <title>yasi - steam guard</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="card">
    <div class="chrome">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot {{STATUS_DOT_CLASS}}"></div>
      </div>
      <div class="chrome-title">yasi - auth</div>
    </div>
    <div class="body">
      <div class="status-line {{STATUS_LINE_CLASS}}">
        <span class="prompt">&gt;</span>
        <span class="message">{{STATUS_MESSAGE}}</span>
        <span class="cursor"></span>
      </div>
      <h1>verification required</h1>
      <p class="sub">steam guard code needed, please use your steam mobile app to retrieve your steam guard code</p>
      <form method="POST" id="guardForm">
        <div class="code-row" id="codeRow">
          <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" data-idx="0" />
          <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" data-idx="1" />
          <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" data-idx="2" />
          <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" data-idx="3" />
          <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" data-idx="4" />
        </div>
        <input type="hidden" name="code" id="codeHidden" />
        <p class="hint">5-character code, letters and numbers</p>
        <button type="submit">submit</button>
      </form>
      <div class="footer-note">running locally - {{LOCAL_ADDRESS}}:{{PORT}}</div>
    </div>
  </div>
  <script>
    const inputBoxesElement = [...document.querySelectorAll('.code-box')];
    const hidden = document.getElementById('codeHidden');
    const form = document.getElementById('guardForm');

    inputBoxesElement[0].focus();

    inputBoxesElement.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        box.classList.toggle('filled', box.value.length > 0);
        if (box.value && i < inputBoxesElement.length - 1) inputBoxesElement[i + 1].focus();
        hidden.value = inputBoxesElement.map(b => b.value).join('');
      });

      box.addEventListener('keydown', (event) => {
        if ((event.key === 'Backspace') && !box.value && i > 0) {
          inputBoxesElement[i - 1].focus();
        }
      });

      box.addEventListener('paste', (event) => {
        event.preventDefault();
        const text = (event.clipboardData.getData('text') || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
        text.split('').forEach((char, idx) => {
          if (inputBoxesElement[idx]) {
            inputBoxesElement[idx].value = char;
            inputBoxesElement[idx].classList.add('filled');
          }
        });
        inputBoxesElement[Math.min(text.length, inputBoxesElement.length - 1)].focus();
        hidden.value = inputBoxesElement.map(b => b.value).join('');
      });
    });

    form.addEventListener('submit', () => {
      hidden.value = inputBoxesElement.map(b => b.value).join('');
    });
  </script>
</body>
</html>
